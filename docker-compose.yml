version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: invoice_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: invoice_backend
    ports:
      - "4000:4000"
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/invoice_app
      PORT: 4000
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: development
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: invoice_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    restart: unless-stopped

volumes:
  mongo_data:
